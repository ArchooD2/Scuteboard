name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Scuteboard
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name Scuteboard `
            --collect-all PySide6 `
            main.py

      - name: Package app
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/Scuteboard `
            -DestinationPath Scuteboard-windows-x64.zip `
            -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scuteboard-windows-x64
          path: Scuteboard-windows-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Scuteboard alpha release."
          }
          gh release upload $tag Scuteboard-windows-x64.zip --clobber
